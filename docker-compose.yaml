services:
  mongodb:
    image: mongodb:v1
    container_name: mongodb
    build: ./mongodb
    volumes:
    - mongodb:/data/db
  redis:
    image: redis:7
    container_name: redis
    # build: redis:7-alpine
    volumes:
    - redis:/data
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    # build: rabbitmq:4.0-alpine
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    volumes:
    - rabbitmq:/var/lib/rabbitmq
  mysql:
    image: mysql:v1
    container_name: mysql
    build: ./mysql
    volumes:
    - mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: RoboShop@1
  catalogue:
    image: catalogue:v1
    container_name: catalogue
    build: ./catalogue
    depends_on:
    - mongodb
  user:
    image: user:v1
    container_name: user
    build: ./user
    depends_on:
    - mongodb
    - redis
  cart:
    image: cart:v1
    container_name: cart
    build: ./cart
    depends_on:
    - catalogue
    - redis
  shipping:
    image: shipping:v1
    container_name: shipping
    build: ./shipping
    depends_on:
    - mysql
    - cart
  payment:
    image: payment:v1
    container_name: payment
    build: ./payment
    depends_on:
    - rabbitmq
    - user
    - cart
  frontend:
    image: frontend:v1
    container_name: frontend
    build: ./frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
    - shipping
    - payment
  
networks:
  default:
    driver: bridge
    name: roboshop
    external: false

volumes:
  mongodb:
  redis:
  rabbitmq:
  mysql:
