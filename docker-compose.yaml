services:
  mongodb:
    image: mongodb
    container_name: mongodb
    build: ./mongodb
    volumes:
    - mongodb:/data/db
  redis:
    image: redis:7-alpine
    container_name: redis
    # build: redis:7-alpine
    volumes:
    - redis:/data
  rabbitmq:
    image: rabbitmq:4.0-alpine
    container_name: rabbitmq
    # build: rabbitmq:4.0-alpine
    volumes:
    - rabbitmq:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
  mysql:
    image: mysql
    container_name: mysql
    build: ./mysql
    volumes:
    - mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: RoboShop@1
  
networks:
  default:
    driver: bridge
    external: false
    name: expense

volumes:
  mongodb:
  redis:
  rabbitmq:
  mysql:
